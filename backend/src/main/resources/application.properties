spring.application.name=backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/personal_page?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

app.jwt.secret=${JWT_SECRET:personal-page-local-development-secret-key-change-me}
app.jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:3600000}
app.refresh-token.expiration-days=${REFRESH_TOKEN_EXPIRATION_DAYS:14}
